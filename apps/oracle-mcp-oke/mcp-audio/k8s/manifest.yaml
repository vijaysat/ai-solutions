apiVersion: v1
kind: Namespace
metadata:
  name: mcp

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fastmcp-server-sa
  namespace: mcp

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fastmcp-client-sa
  namespace: mcp

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-config
  namespace: mcp
data:
  APP_NAME: "fastmcp-demo"
  PORT: "8080"
  HOST: "0.0.0.0"
  NOTIFICATION_TOPIC_ID: "<Notification_Topic_OCID>"
  COMPARTMENT_ID: "<Compartment_OCID>"
  OCI_NAMESPACE: "<OCI_NAMESPACE>"
  SPEECH_BUCKET: "<SPEECH_BUCKET>"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastmcp-server
  namespace: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastmcp-server
  template:
    metadata:
      labels:
        app: fastmcp-server
    spec:
      serviceAccountName: fastmcp-server-sa
      imagePullSecrets:
        - name: ocirsecret
      containers:
        - name: fastmcp-server
          image: <mcp-audio-image-tag>
          envFrom:
            - secretRef:     # Create this first: kubectl create secret generic mcp-secrets --from-env-file=mcp-audio/.env -n mcp
                name: mcp-secrets
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          imagePullPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: fastmcp-server
  namespace: mcp
spec:
  selector:
    app: fastmcp-server
  ports:
    - name: http
      port: 80
      targetPort: http
  type: LoadBalancer

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastmcp-client
  namespace: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastmcp-client
  template:
    metadata:
      labels:
        app: fastmcp-client
    spec:
      serviceAccountName: fastmcp-client-sa
      imagePullSecrets:
        - name: ocirsecret
      containers:
        - name: fastmcp-client
          image: <mcp-client-image-tag>
          envFrom:
            - secretRef: # Create this first: kubectl create secret generic mcp-client-secrets --from-env-file=mcp-client/.env -n mcp
                name: mcp-client-secrets
          env:
            - name: MCP_URL
              value: "http://fastmcp-server.mcp.svc.cluster.local/mcp/"
            - name: MCP_PUBLIC_URL
              value: "http://fastmcp-server.mcp.svc.cluster.local/mcp/"
            - name: GRADIO_SERVER_NAME
              value: "0.0.0.0"
            - name: GRADIO_SERVER_PORT
              value: "7860"
          ports:
            - name: http
              containerPort: 7860
          readinessProbe:
            httpGet:
              path: /
              port: 7860
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 7860
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          imagePullPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: fastmcp-client
  namespace: mcp
spec:
  selector:
    app: fastmcp-client
  ports:
    - name: http
      port: 80
      targetPort: http
  type: LoadBalancer
